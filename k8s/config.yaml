apiVersion: v1
kind: ConfigMap
metadata:
  name: signup-config
data:
  KAFKA_BOOTSTRAP_SERVERS: kafka:9092
  POSTGRES_DB: signups
  POSTGRES_USER: signup
  DATABASE_URL: postgresql://signup:signup_pw@postgres:5432/signups
---
apiVersion: v1
kind: Secret
metadata:
  name: signup-secret
type: Opaque
stringData:
  POSTGRES_PASSWORD: signup_pw
