apiVersion: apps/v1
kind: Deployment
metadata: {name: api}
spec:
  replicas: 1
  selector: {matchLabels: {app: api}}
  template:
    metadata: {labels: {app: api}}
    spec:
      containers:
        - name: api
          image: signup-lab-api:latest
          imagePullPolicy: Never
          envFrom: [{configMapRef: {name: signup-config}}]
          ports: [{containerPort: 8000}]
---
apiVersion: v1
kind: Service
metadata: {name: api}
spec:
  type: NodePort
  selector: {app: api}
  ports: [{port: 8000, targetPort: 8000, nodePort: 30800}]
---
apiVersion: apps/v1
kind: Deployment
metadata: {name: worker}
spec:
  replicas: 1
  selector: {matchLabels: {app: worker}}
  template:
    metadata: {labels: {app: worker}}
    spec:
      containers:
        - name: worker
          image: signup-lab-worker:latest
          imagePullPolicy: Never
          envFrom:
            - configMapRef: {name: signup-config}
            - secretRef: {name: signup-secret}
          ports: [{containerPort: 8001}]
---
apiVersion: v1
kind: Service
metadata: {name: worker}
spec:
  type: NodePort
  selector: {app: worker}
  ports: [{port: 8001, targetPort: 8001, nodePort: 30801}]
